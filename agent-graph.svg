<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" font-family="'Segoe UI', system-ui, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="1100" fill="#0f1117"/>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1a1d2e" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6b7280"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fb923c"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4ade80"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f87171"/>
    </marker>
    <filter id="glow-yellow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fbbf24" flood-opacity="0.4"/>
    </filter>
    <filter id="glow-green">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#4ade80" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#a78bfa" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-orange">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#fb923c" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="900" height="1100" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff" letter-spacing="1">Invoxa — Agent Graph</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#6b7280">LangGraph · CompiledStateGraph · MemorySaver checkpointer</text>
  <line x1="40" y1="68" x2="860" y2="68" stroke="#1e2130" stroke-width="1"/>

  <!-- ── START node ── -->
  <circle cx="450" cy="105" r="28" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <text x="450" y="109" text-anchor="middle" font-size="12" font-weight="700" fill="#9ca3af">START</text>

  <!-- START → route_action -->
  <line x1="450" y1="133" x2="450" y2="158" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── route_action ── -->
  <!-- Diamond shape -->
  <polygon points="450,160 560,210 450,260 340,210" fill="#1c1a08" stroke="#ca8a04" stroke-width="2" filter="url(#glow-yellow)"/>
  <text x="450" y="205" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">route_action()</text>
  <text x="450" y="220" text-anchor="middle" font-size="10" fill="#9ca3af">state["action"]</text>

  <!-- route_action labels -->
  <text x="190" y="290" text-anchor="middle" font-size="10" fill="#fbbf24">upload_invoice</text>
  <text x="450" y="290" text-anchor="middle" font-size="10" fill="#4ade80">generate_report</text>
  <text x="710" y="290" text-anchor="middle" font-size="10" fill="#a78bfa">chat</text>

  <!-- route → extract (left path) -->
  <path d="M 340 210 L 190 210 L 190 310" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- route → generate_report (center path) -->
  <line x1="450" y1="260" x2="450" y2="700" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>

  <!-- route → chat (right path) -->
  <path d="M 560 210 L 710 210 L 710 700" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>

  <!-- ═══════════════════════════════════
       PATH A — upload_invoice (left column)
  ═══════════════════════════════════ -->

  <!-- Node: extract_invoice_data -->
  <rect x="70" y="310" width="240" height="90" rx="10" fill="#1c1a08" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="310" width="240" height="26" rx="10" fill="#92400e" opacity="0.6"/>
  <rect x="70" y="326" width="240" height="10" rx="0" fill="#92400e" opacity="0.6"/>
  <text x="190" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">extract_invoice_data</text>
  <text x="190" y="348" text-anchor="middle" font-size="10" fill="#9ca3af">Download from Drive</text>
  <text x="190" y="362" text-anchor="middle" font-size="10" fill="#9ca3af">PyMuPDF → base64 JPEG</text>
  <text x="190" y="376" text-anchor="middle" font-size="10" fill="#9ca3af">GPT-4o vision extraction</text>
  <text x="190" y="390" text-anchor="middle" font-size="10" fill="#6b7280">→ extracted_data[ ]</text>

  <!-- extract → suggest_filename -->
  <line x1="190" y1="400" x2="190" y2="420" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Node: suggest_filename -->
  <rect x="70" y="420" width="240" height="80" rx="10" fill="#1c1a08" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="420" width="240" height="26" rx="10" fill="#92400e" opacity="0.6"/>
  <rect x="70" y="436" width="240" height="10" rx="0" fill="#92400e" opacity="0.6"/>
  <text x="190" y="438" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">suggest_filename</text>
  <text x="190" y="458" text-anchor="middle" font-size="10" fill="#9ca3af">Build Supplier_Cat_Date_Amt.ext</text>
  <text x="190" y="472" text-anchor="middle" font-size="10" fill="#9ca3af">pending_approval = True</text>
  <text x="190" y="488" text-anchor="middle" font-size="10" fill="#fbbf24">→ suggested_filename</text>

  <!-- suggest → INTERRUPT -->
  <line x1="190" y1="500" x2="190" y2="520" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)"/>

  <!-- INTERRUPT box 1 -->
  <rect x="70" y="520" width="240" height="70" rx="8" fill="#1a1000" stroke="#fbbf24" stroke-width="2" filter="url(#glow-yellow)"/>
  <text x="190" y="543" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">⏸  INTERRUPT</text>
  <text x="190" y="559" text-anchor="middle" font-size="10" fill="#9ca3af">interrupt_before=</text>
  <text x="190" y="573" text-anchor="middle" font-size="10" fill="#9ca3af">["rename_and_organize"]</text>

  <!-- INTERRUPT → rename (resume) -->
  <line x1="190" y1="590" x2="190" y2="610" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="230" y="603" font-size="9" fill="#fbbf24">graph.invoke(None)</text>

  <!-- Node: rename_and_organize -->
  <rect x="70" y="610" width="240" height="90" rx="10" fill="#1c1a08" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="610" width="240" height="26" rx="10" fill="#92400e" opacity="0.6"/>
  <rect x="70" y="626" width="240" height="10" rx="0" fill="#92400e" opacity="0.6"/>
  <text x="190" y="628" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">rename_and_organize</text>
  <text x="190" y="648" text-anchor="middle" font-size="10" fill="#9ca3af">Apply user_approved_data</text>
  <text x="190" y="662" text-anchor="middle" font-size="10" fill="#9ca3af">Move → Expenses/Month/</text>
  <text x="190" y="676" text-anchor="middle" font-size="10" fill="#9ca3af">Update Firestore</text>
  <text x="190" y="690" text-anchor="middle" font-size="10" fill="#6b7280">→ renamed_files[ ]</text>

  <!-- rename → should_continue_processing (diamond) -->
  <line x1="190" y1="700" x2="190" y2="730" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- should_continue_processing diamond -->
  <polygon points="190,732 270,762 190,792 110,762" fill="#1c1a08" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="190" y="758" text-anchor="middle" font-size="9" font-weight="700" fill="#fde68a">more</text>
  <text x="190" y="770" text-anchor="middle" font-size="9" font-weight="700" fill="#fde68a">invoices?</text>

  <!-- loop back to suggest_filename -->
  <path d="M 110 762 L 50 762 L 50 460 L 70 460" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="28" y="615" text-anchor="middle" font-size="9" fill="#fb923c" transform="rotate(-90,28,615)">yes → suggest_filename</text>

  <!-- should_continue → check_anomalies -->
  <line x1="190" y1="792" x2="190" y2="820" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="235" y="810" font-size="9" fill="#9ca3af">no</text>

  <!-- Node: check_anomalies -->
  <rect x="70" y="820" width="240" height="100" rx="10" fill="#1c1a08" stroke="#ca8a04" stroke-width="2" filter="url(#shadow)"/>
  <rect x="70" y="820" width="240" height="26" rx="10" fill="#92400e" opacity="0.6"/>
  <rect x="70" y="836" width="240" height="10" rx="0" fill="#92400e" opacity="0.6"/>
  <text x="190" y="838" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">check_anomalies</text>
  <text x="190" y="858" text-anchor="middle" font-size="10" fill="#9ca3af">Duplicates (fuzzy ≥82%)</text>
  <text x="190" y="872" text-anchor="middle" font-size="10" fill="#9ca3af">Unusual amounts (&gt;2× avg)</text>
  <text x="190" y="886" text-anchor="middle" font-size="10" fill="#9ca3af">Missing recurring suppliers</text>
  <text x="190" y="900" text-anchor="middle" font-size="10" fill="#6b7280">→ anomaly_warnings[ ]</text>

  <!-- check_anomalies → END (A path) -->
  <line x1="190" y1="920" x2="190" y2="950" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════
       PATH B — generate_report (center)
  ═══════════════════════════════════ -->

  <!-- Node: generate_report -->
  <rect x="330" y="700" width="240" height="90" rx="10" fill="#052e16" stroke="#16a34a" stroke-width="2" filter="url(#glow-green)" filter="url(#shadow)"/>
  <rect x="330" y="700" width="240" height="26" rx="10" fill="#166534" opacity="0.7"/>
  <rect x="330" y="716" width="240" height="10" rx="0" fill="#166534" opacity="0.7"/>
  <text x="450" y="718" text-anchor="middle" font-size="11" font-weight="700" fill="#4ade80">generate_report</text>
  <text x="450" y="738" text-anchor="middle" font-size="10" fill="#9ca3af">Load month/year invoices</text>
  <text x="450" y="752" text-anchor="middle" font-size="10" fill="#9ca3af">Write Google Sheets tabs</text>
  <text x="450" y="766" text-anchor="middle" font-size="10" fill="#9ca3af">Move sheet → Expenses/</text>
  <text x="450" y="780" text-anchor="middle" font-size="10" fill="#6b7280">→ report_url, sheet_id</text>

  <!-- generate_report → END -->
  <line x1="450" y1="790" x2="450" y2="950" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ═══════════════════════════════════
       PATH C — chat (right column)
  ═══════════════════════════════════ -->

  <!-- Node: chat_with_expenses -->
  <rect x="590" y="700" width="240" height="100" rx="10" fill="#2d1f5e" stroke="#7c3aed" stroke-width="2" filter="url(#shadow)"/>
  <rect x="590" y="700" width="240" height="26" rx="10" fill="#4c1d95" opacity="0.7"/>
  <rect x="590" y="716" width="240" height="10" rx="0" fill="#4c1d95" opacity="0.7"/>
  <text x="710" y="718" text-anchor="middle" font-size="11" font-weight="700" fill="#c4b5fd">chat_with_expenses</text>
  <text x="710" y="738" text-anchor="middle" font-size="10" fill="#9ca3af">Load all invoices + suppliers</text>
  <text x="710" y="752" text-anchor="middle" font-size="10" fill="#9ca3af">Build expense context</text>
  <text x="710" y="766" text-anchor="middle" font-size="10" fill="#9ca3af">GPT-4o-mini · last 20 turns</text>
  <text x="710" y="780" text-anchor="middle" font-size="10" fill="#9ca3af">Append to chat_history</text>
  <text x="710" y="794" text-anchor="middle" font-size="10" fill="#6b7280">→ agent_response</text>

  <!-- chat → END -->
  <line x1="710" y1="800" x2="710" y2="950" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- ── END nodes (merge) ── -->
  <!-- Convergence lines to END -->
  <path d="M 190 950 L 190 980 L 450 980" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <path d="M 710 950 L 710 980 L 450 980" fill="none" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="450" y1="950" x2="450" y2="980" stroke="#6b7280" stroke-width="1.5"/>
  <line x1="450" y1="980" x2="450" y2="1000" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- END circle -->
  <circle cx="450" cy="1028" r="28" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <text x="450" y="1032" text-anchor="middle" font-size="12" font-weight="700" fill="#9ca3af">END</text>

  <!-- ── LEGEND ── -->
  <rect x="570" y="310" width="290" height="350" rx="10" fill="#111827" stroke="#1f2937" stroke-width="1.5"/>
  <text x="715" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#d1d5db">Legend</text>
  <line x1="580" y1="342" x2="850" y2="342" stroke="#374151" stroke-width="0.8"/>

  <!-- Node types -->
  <rect x="588" y="352" width="16" height="16" rx="3" fill="#1c1a08" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="612" y="364" font-size="10" fill="#9ca3af">Agent Node (upload path)</text>

  <rect x="588" y="376" width="16" height="16" rx="3" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="612" y="388" font-size="10" fill="#9ca3af">Agent Node (report path)</text>

  <rect x="588" y="400" width="16" height="16" rx="3" fill="#2d1f5e" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="612" y="412" font-size="10" fill="#9ca3af">Agent Node (chat path)</text>

  <polygon points="596,432 612,424 628,432 612,440" fill="#1c1a08" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="640" y="436" font-size="10" fill="#9ca3af">Conditional Router</text>

  <rect x="588" y="450" width="16" height="16" rx="3" fill="#1a1000" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="612" y="462" font-size="10" fill="#9ca3af">HITL Interrupt</text>

  <line x1="580" y1="474" x2="850" y2="474" stroke="#374151" stroke-width="0.5"/>

  <!-- Edge types -->
  <line x1="588" y1="490" x2="630" y2="490" stroke="#fbbf24" stroke-width="2" marker-end="url(#arrow-yellow)"/>
  <text x="638" y="494" font-size="10" fill="#9ca3af">upload_invoice flow</text>

  <line x1="588" y1="510" x2="630" y2="510" stroke="#4ade80" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-green)"/>
  <text x="638" y="514" font-size="10" fill="#9ca3af">generate_report flow</text>

  <line x1="588" y1="530" x2="630" y2="530" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="638" y="534" font-size="10" fill="#9ca3af">chat flow</text>

  <line x1="588" y1="550" x2="630" y2="550" stroke="#fb923c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="638" y="554" font-size="10" fill="#9ca3af">loop (more invoices)</text>

  <line x1="580" y1="568" x2="850" y2="568" stroke="#374151" stroke-width="0.5"/>

  <!-- Key facts -->
  <text x="588" y="584" font-size="10" font-weight="600" fill="#fbbf24">Checkpointer:</text>
  <text x="588" y="598" font-size="10" fill="#6b7280">MemorySaver (per thread_id)</text>
  <text x="588" y="616" font-size="10" font-weight="600" fill="#fbbf24">Interrupt:</text>
  <text x="588" y="630" font-size="10" fill="#6b7280">interrupt_before=</text>
  <text x="588" y="644" font-size="10" fill="#6b7280">  ["rename_and_organize"]</text>
  <text x="588" y="662" font-size="10" font-weight="600" fill="#fbbf24">Resume:</text>
  <text x="588" y="676" font-size="10" fill="#6b7280">graph.update_state(config, edits)</text>
  <text x="588" y="690" font-size="10" fill="#6b7280">graph.invoke(None, config)</text>

</svg>
